# Runs `bash test.sh` on every push and PR.
#
# Action versions are pinned to commit SHAs (not floating tags) so a
# compromise of the v6 tag cannot silently change what we run. Update
# pins by replacing both the SHA and the trailing version comment.

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Make hooks executable
        run: chmod +x .claude/hooks/*.sh tools/*.sh test.sh

      - name: Run test suite
        run: bash test.sh
